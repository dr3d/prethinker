<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{PAGE_DESCRIPTION}}" />
  <style id="skin-style">
{{INITIAL_SKIN_CSS}}
  </style>
  <style id="accordion-style">
    .step-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
    }

    .step-heading:focus-visible {
      outline: 2px solid var(--copy-border);
      outline-offset: 2px;
      border-radius: 6px;
    }

    .step-heading-label {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
      line-height: inherit;
    }

    .step-caret {
      color: var(--ink);
      font-size: 19px;
      line-height: 1;
      transition: transform .15s ease;
      transform-origin: 50% 50%;
      color: var(--muted);
    }

    .step-card.is-open .step-caret {
      transform: rotate(180deg);
    }

    .step-body {
      display: none;
      margin-top: 0;
    }

    .step-card.is-open .step-body {
      display: block;
    }
  </style>
</head>
<body data-skin="{{INITIAL_SKIN_NAME}}">
  <div class="wrap">
    <div class="topbar">
      <h1>{{PAGE_TITLE}}</h1>
      <div class="topbar-right">
        <div class="nav-links">
          <a class="nav-link" href="{{NAV_DOCS_HUB}}">Back to Docs Hub</a>
          <a class="nav-link" href="{{NAV_REPO}}">View Repo</a>
          <button id="appearance-toggle" class="theme-btn" aria-label="Switch transcript appearance">appearance</button>
        </div>
      </div>
    </div>
    <div class="meta">{{PAGE_META}}</div>
    {{CONTENT_HTML}}
  </div>
  <script id="skin-css-map" type="application/json">{{SKIN_CSS_MAP_JSON}}</script>
  <script>
    (() => {
      const root = document.documentElement;
      const body = document.body;
      const appearanceToggle = document.getElementById("appearance-toggle");
      const skinStyle = document.getElementById("skin-style");
      const skinMapNode = document.getElementById("skin-css-map");
      const appearanceStorageKey = "{{APPEARANCE_STORAGE_KEY}}";
      const defaultSkin = "{{INITIAL_SKIN_NAME}}";
      const skinOrder = {{SKIN_ORDER_JSON}};

      let skinMap = {};
      try {
        skinMap = JSON.parse((skinMapNode && skinMapNode.textContent) || "{}");
      } catch (error) {
        skinMap = {};
      }

      const appearanceStates = [];
      for (const skin of skinOrder) {
        appearanceStates.push({ skin, theme: "light" });
        appearanceStates.push({ skin, theme: "dark" });
      }

      const setTheme = (theme) => {
        root.setAttribute("data-theme", theme);
      };

      const setSkin = (skin) => {
        if (!skinMap[skin]) {
          return;
        }
        if (skinStyle) {
          skinStyle.textContent = skinMap[skin];
        }
        if (body) {
          body.setAttribute("data-skin", skin);
        }
      };

      const setAppearance = (appearance) => {
        const skin = appearance && appearance.skin && skinMap[appearance.skin] ? appearance.skin : defaultSkin;
        const theme = appearance && appearance.theme === "dark" ? "dark" : "light";
        setSkin(skin);
        setTheme(theme);
        if (appearanceToggle) {
          appearanceToggle.textContent = `appearance: ${skin} ${theme}`;
        }
      };

      const findAppearanceIndex = () => {
        const currentSkin = body ? body.getAttribute("data-skin") : defaultSkin;
        const currentTheme = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
        return appearanceStates.findIndex((state) => state.skin === currentSkin && state.theme === currentTheme);
      };

      const storedAppearanceRaw = window.localStorage.getItem(appearanceStorageKey);
      if (storedAppearanceRaw) {
        try {
          const storedAppearance = JSON.parse(storedAppearanceRaw);
          setAppearance(storedAppearance);
        } catch (error) {
          setAppearance({ skin: defaultSkin, theme: "light" });
        }
      } else {
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        setAppearance({ skin: defaultSkin, theme: prefersDark });
      }

      if (appearanceToggle) {
        appearanceToggle.addEventListener("click", () => {
          const index = findAppearanceIndex();
          const next = appearanceStates[(index + 1) % appearanceStates.length] || appearanceStates[0];
          setAppearance(next);
          window.localStorage.setItem(appearanceStorageKey, JSON.stringify(next));
        });
      }

      const copyButtons = document.querySelectorAll(".copy-btn");
      for (const button of copyButtons) {
        button.addEventListener("click", async () => {
          const text = button.getAttribute("data-copy") || "";
          const idle = button.getAttribute("data-label") || "copy";
          const done = button.getAttribute("data-success-label") || "copied";
          const fail = button.getAttribute("data-failure-label") || "copy-failed";
          try {
            await navigator.clipboard.writeText(text);
            button.textContent = done;
            button.classList.add("copied");
          } catch (error) {
            button.textContent = fail;
          }
          window.setTimeout(() => {
            button.textContent = idle;
            button.classList.remove("copied");
          }, 1200);
        });
      }

      const stepCards = Array.from(document.querySelectorAll(".step-card"));
      if (stepCards.length > 0) {
        stepCards.forEach((card, idx) => {
          const heading = card.querySelector(":scope > h2");
          if (!heading) {
            return;
          }
          const headingHtml = heading.innerHTML;
          heading.innerHTML = "";

          const body = document.createElement("div");
          body.className = "step-body";
          while (heading.nextSibling) {
            body.appendChild(heading.nextSibling);
          }
          card.appendChild(body);

          heading.classList.add("step-heading");
          heading.setAttribute("tabindex", "0");
          heading.setAttribute("role", "button");
          heading.setAttribute("aria-expanded", "false");

          const label = document.createElement("span");
          label.className = "step-heading-label";
          label.innerHTML = headingHtml;

          const caret = document.createElement("span");
          caret.className = "step-caret";
          caret.setAttribute("aria-hidden", "true");
          caret.innerHTML = "&#9662;";

          heading.appendChild(label);
          heading.appendChild(caret);

          if (idx === 0) {
            card.classList.add("is-open");
            heading.setAttribute("aria-expanded", "true");
          }

          const toggle = () => {
            if (card.classList.contains("is-open")) {
              card.classList.remove("is-open");
              heading.setAttribute("aria-expanded", "false");
              return;
            }
            stepCards.forEach((other) => {
              const otherHeading = other.querySelector(":scope > h2");
              other.classList.remove("is-open");
              if (otherHeading) {
                otherHeading.setAttribute("aria-expanded", "false");
              }
            });
            card.classList.add("is-open");
            heading.setAttribute("aria-expanded", "true");
            card.scrollIntoView({ behavior: "smooth", block: "start" });
          };

          heading.addEventListener("click", toggle);
          heading.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              toggle();
            }
          });
        });
      }
    })();
  </script>
</body>
</html>
